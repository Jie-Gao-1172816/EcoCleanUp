{% extends "userbase.html" %}
{% set active_page = 'home' %}
{% block title %}Edit Event{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-10">

    <!-- Page header: title + back link -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
      <div>
        <h1 class="h4 mb-0">Edit Event</h1>
        <div class="text-muted small">Update event details. Required fields are marked with *.</div>
      </div>
      <a class="btn btn-outline-eco " href="{{ url_for('admin_events') }}">Back to events</a>
    </div>

    <!-- Form card -->
    <div class="card shadow-sm border-0 eco-card">
      <div class="card-body">

        <!-- Edit event form -->
        <form method="post" novalidate>
          <div class="row g-3">

            <div class="col-12 col-md-6">
              <label class="form-label">Event Name *</label>
              <input class="form-control" name="event_name" value="{{ event.event_name }}" required>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Location *</label>
              <input class="form-control" name="location" value="{{ event.location }}" required>
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">Event Type</label>
              <input class="form-control" name="event_type" value="{{ event.event_type or '' }}">
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">Date *</label>
              <input type="date" class="form-control" name="event_date" value="{{ event.event_date }}" required>
            </div>

            <div class="col-6 col-md-2">
              <label class="form-label">Start *</label>
              <input type="time" class="form-control" name="start_time" value="{{ event.start_time }}" required>
            </div>

            <div class="col-6 col-md-2">
              <label class="form-label">End *</label>
              <input type="time" class="form-control" name="end_time" value="{{ event.end_time }}" required>
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label">Duration</label>
              <input class="form-control" name="duration" value="{{ event.duration }}">
              <div class="form-text">Minutes (optional).</div>
            </div>

            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea class="form-control" name="description" rows="3">{{ event.description or '' }}</textarea>
            </div>

            <div class="col-12">
              <label class="form-label">Supplies</label>
              <textarea class="form-control" name="supplies" rows="2">{{ event.supplies or '' }}</textarea>
            </div>

            <div class="col-12">
              <label class="form-label">Safety Instructions</label>
              <textarea class="form-control" name="safety_instructions" rows="3">{{ event.safety_instructions or '' }}</textarea>
            </div>

          </div>

          <!-- Form actions -->
          <div class="d-grid d-sm-flex gap-2 justify-content-sm-start mt-4">
            <button class="btn btn-eco" type="submit" style="min-width: 110px;">Save</button>
            <a class="btn btn-outline-eco" href="{{ url_for('admin_events') }}" style="min-width: 110px;">Cancel</a>
          </div>
        </form>

      </div>
    </div>

  </div>
</div>
{% endblock %}
