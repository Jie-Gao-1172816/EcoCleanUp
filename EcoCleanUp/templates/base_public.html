<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}EcoCleanUp{% endblock %}</title>

    <!-- Bootstrap (required) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Theme override (allowed) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>

  <body class="bg-body-tertiary">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"></script>

    <!-- Public navbar (no profile/logout) -->
    <nav class="navbar navbar-expand-sm navbar-dark eco-header mb-4">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">EcoCleanUp</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#publicNav"
          aria-controls="publicNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="publicNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link{% if active_page=='home' %} active{% endif %}" href="{{ url_for('home') }}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link{% if active_page=='login' %} active{% endif %}" href="{{ url_for('login') }}">Log In</a>
            </li>
            <li class="nav-item">
              <a class="nav-link{% if active_page=='signup' %} active{% endif %}" href="{{ url_for('signup') }}">Sign up</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container pb-4">
      {% block content %}{% endblock %}
    </main>

    <footer class="container pb-4">
      <div class="text-center small text-muted">
        <!-- Replace with your real info -->
        Yuechun Wu · Student ID: 1233683
      </div>
    </footer>
  </body>
</html>
